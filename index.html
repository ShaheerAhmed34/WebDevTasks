<!DOCTYPE html>
<html>
<head>
    <title>Layout Design</title>
</head>
<body>

    <!-- Header -->
    <header style="background-color: #ccc; text-align:center; padding:20px;">
        <h2>Header</h2>
    </header>

    <!-- Navigation Menu -->
    <nav style="background-color:  #ddd; text-align:center; padding:15px;">
        <h3>Navigation Menu</h3>
    </nav>

    <!-- Main Layout -->
    <div style="display:flex; padding:10px;">

        <!-- Left Sidebar -->
        <aside style="width:20%; background-color:#ccc; padding:20px; margin-right:10px;">
            <p>Content</p>
        </aside>

        <!-- Main Content -->
        <section style="width:60%; background-color:#ccc; padding:20px; margin-right:10px;">
            <p>Main Content</p>
        </section>

        <!-- Right Sidebar -->
        <aside style="width:20%; background-color:#ccc; padding:20px;">
            <p>Content</p>
        </aside>

    </div>

    <!-- Footer -->
    <footer style="background-color:#ccc; text-align:center; padding:20px;">
        <h3>Footer</h3>
    </footer>

</body>
</html>
