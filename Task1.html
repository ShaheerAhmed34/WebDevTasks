<!DOCTYPE html>

<html>
<head>
    <title>Layout Design</title>
</head>

<body style="margin:0; height:100vh; display:flex; flex-direction:column;">

<!-- Header -->
<header style="background-color:#ddd; text-align:center; padding:10px; margin-bottom: 10px;">
    <h2>Header</h2>
</header>

<!-- Navigation Menu -->
<nav style="background-color:#ddd; text-align:center; padding:10px; text-align: center;">
    <h3>Navigation Menu</h3>
</nav>

<!-- Main Layout -->
<main style="flex:1; display:flex; margin-top: 10px; margin-bottom: 10px; text-align: center;">

    <!-- Left Sidebar -->
    <aside style="width:20%; background-color:#ddd; padding:20px; margin-right:10px;">
        <p style="margin-top: 50%">Content</p>
    </aside>

    <!-- Main Content -->
    <section style="width:60%; background-color:#ddd; padding:20px; margin-right:10px;">
        <p style="margin-top: 18%">Main Content</p>
    </section>

    <!-- Right Sidebar -->
    <aside style="width:20%; background-color:#ddd; padding:20px;">
        <p style="margin-top: 50%">Content</p>
    </aside>

</main>

<!-- Footer -->
<footer style="background-color:#ddd; text-align:center; padding:10px;">
    <h3>Footer</h3>
</footer>

</body>
</html>
